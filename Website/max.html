    <div class="header-content">
        <h1>Max/MSP Beat Machine</h1>
    
        <p>A Max/MSP patch I created that allows a user to create
           synth and drum patterns, via presented wave setup, using a with a controller.
           <br>
           The user can eventually record and bounce a live track to a wav file.
        </p>

            <video src = "max.mkv" controls width = "500" height = "300"></video>
        </div>    
    </div> 

    <script>
    document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", function (e) {

            // only run for internal links
            if (this.hostname === window.location.hostname) {
                e.preventDefault();

                document.body.classList.add("fade-out");

                setTimeout(() => {
                    window.location = this.href;
                }, 400);
            }
        });
    });
    </script>
